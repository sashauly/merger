name: Deploy to GitHub Pages

on:
    push:
        branches: ["main"]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-and-deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # 1. Set up Rust toolchain for WebAssembly compilation
            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            # 2. Cache Rust Cargo builds to keep compile times fast
            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            # 3. Install wasm-pack to bundle Rust into WebAssembly
            - name: Install wasm-pack
              uses: jetli/wasm-pack-action@v0.4.0
              with:
                  version: "latest"

            # 4. Set up Node.js with caching
            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: Compile and Build App
              run: |
                  npm ci
                  npm run build:wasm
                  npm run build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "web/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
